<body class="pack">
<main class="app-layout">

<aside class="side-panel">

 <button class="accueil-btn">
  <i data-lucide="home"></i>
  Accueil
</button>

</aside>

<section class="main-content">

<header class="brand">
<div class="brand-info">
    <video src="../../assets/video/logo-Sonara.mp4"
  class="brand-logo"
  autoplay
  muted
  playsinline
  onended="this.pause(); this.currentTime = this.duration;">
</video>
<h2 class="page"></h2>
</div>
<div class="border-brand"></div>
</header>

<section class="scroll-zone">

<section class="loader">
  <div class="spinner"></div>
  <p class="loader-text"></p>
</section>


<section class="pack-list">
  <!-- Les packs seront générés ici par JavaScript -->
</section>


</main>

    <div class="notice-overlay">
      <div class="notice-box">
      <button class="notice-close">&times;</button>
      <h2>Droit d'utilisation</h2>

      <p>🎧 Utilisation du pack :
    ✔️ Vidéos (Tiktok, Youtube, films, etc.)
    ✔️ Usage illimité (projets perso & pro.)
    ✔️ Utiliser des daw (rajouter des effet sur les sons.)
    
    🚫 Interdit:
    ❌ revente des sons
    ❌ partage du pack
    ❌ upload sur une plateforme musicale.
    </p>
    <div class="notice-actions">
    <button class="notice-refuse">Refuser</button>
    <button class="notice-accept">Accepter</button>
    </div>
      </div>

<script src="../js/data/data.js" defer></script>
<script src="../js/pack.js" defer></script>
<script src="https://unpkg.com/lucide@latest"></script>
